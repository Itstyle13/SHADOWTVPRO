services:
  # Backend (Node.js/Fastify)
  - type: web
    name: shadow-tv-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: XTREAM_URL
        sync: false
      - key: XTREAM_USER
        sync: false
      - key: XTREAM_PASS
        sync: false

  # Frontend (Static Site/Vite)
  - type: static
    name: shadow-tv-frontend
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: shadow-tv-backend
          type: web
          property: host
