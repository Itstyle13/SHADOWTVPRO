services:
  # Backend (Node.js/Fastify)
  - type: web
    name: shadow-tv-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true

  # Frontend (Static Site/Vite)
  - type: web
    name: shadow-tv-frontend
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://shadow-tv-backend.onrender.com
